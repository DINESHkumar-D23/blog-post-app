name: Deploy to Render (via Git Push)

# Render auto-deploys from GitHub on every push to main.
# This workflow just validates the build so you catch errors early.

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Validate UI build
        run: |
          cd ui
          npm ci
          npm run build
        env:
          VITE_API_URL: https://blog-gateway.onrender.com